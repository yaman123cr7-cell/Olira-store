<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLIRA Beauty</title>

<meta name="description" content="OLIRA Beauty متجر منتجات العناية بالبشرة والشعر في اسرائيل">
<meta name="keywords" content="OLIRA, منتجات بشرة, عناية بالشعر, متجر تجميل">
<meta name="author" content="OLIRA">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff0f3;
}
header {
    background: linear-gradient(to right, #000, #1a1a1a);
}
    color: white;
    padding: 15px;
    text-align: center;
}
nav {
    background: #fff;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    position: sticky;
    top: 0;
}
nav button {
    border: none;
    background: none;
    font-size: 16px;
    cursor: pointer;
}
.section {
    display: none;
    padding: 15px;
}
.active {
    display: block;
}
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.product {
    background: white;
    border-radius: 10px;
    width: 200px;
    margin: 10px;
    padding: 10px;
    text-align: center;
}
.product img {
    width: 100%;
}
button.add {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
}
.cart {
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style></head>
<body><header style="text-align:center; padding:20px;">
<img src="logo.png" style="width:200px;">
</header>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('cart')">السلة</button>
<button onclick="show('about')">من نحن</button>
</nav><div id="home" class="section active">
<h2>منتجاتنا</h2><div class="products"><div class="product">
<img  src="https://i.postimg.cc/m1Hjs4Qm/1775146577261.png">
<h3>كريم ترطيب</h3>
<p>₪50</p>
<button class="add" onclick="addToCart('كريم ترطيب',50)">أضف للسلة</button>
</div><div class="product">
<img src="https://i.postimg.cc/zHg7rNn6/1775146581697.png">
<h3>سيروم فيتامين C</h3>
<p>₪70</p>
<button class="add" onclick="addToCart('سيروم فيتامين C',70)">أضف للسلة</button>
</div><div class="product">
<img src="https://i.postimg.cc/QKTm3DQs/1775146623233.png">
<h3>زيت شعر</h3>
<p>₪60</p>
<button class="add" onclick="addToCart('زيت شعر',60)">أضف للسلة</button>
</div></div>
</div><div id="cart" class="section">
<h2>🛒 سلة الشراء</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
</div><div id="about" class="section">
<h2>🌸 من نحن</h2>
<p>
OLIRA هو متجر متخصص في منتجات العناية بالبشرة والشعر، نقدم أفضل المنتجات بجودة عالية وأسعار مناسبة.
</p>
</div><script>
let cart = [];

function show(section){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(section).classList.add('active');
}

function addToCart(name,price){
    cart.push({name,price});
    alert("تمت الإضافة للسلة");
    renderCart();
}

function renderCart(){
    let container = document.getElementById("cartItems");
    let total = 0;
    container.innerHTML = "";
    cart.forEach(item=>{
        container.innerHTML += "<p>"+item.name+" - ₪"+item.price+"</p>";
        total += item.price;
    });
    document.getElementById("total").innerText = "المجموع: ₪" + total;
}

function sendOrder(){
    let phone = "972523848599";
    let text = "طلب جديد:%0A";
    cart.forEach(item=>{
        text += item.name + " - ₪" + item.price + "%0A";
    });
    window.open("https://wa.me/" + phone + "?text=" + text);
}
</script></body>
</html>
